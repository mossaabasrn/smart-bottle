<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Smart Bottle Label</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #fde2e4, #e4c1f9);
  text-align: center;
  color: #3c096c;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.bottle {
  width: 120px;
  height: 260px;
  margin: 20px auto;
  border-radius: 60px;
  background: #cdb4db;
  position: relative;
  overflow: hidden;
}

.label {
  position: absolute;
  bottom: 40px;
  left: 10px;
  right: 10px;
  height: 60px;
  border-radius: 10px;
  background: linear-gradient(90deg, #9d4edd, #c77dff);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  transition: background 1s;
}

button {
  background: #9d4edd;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.status {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

  <h1>💧 Smart Bottle Label</h1>

  <div class="card">
    <div class="bottle">
      <div id="label" class="label">SAFE</div>
    </div>

    <button onclick="startHeat()">Simuler chaleur progressive ☀️</button>
    <div id="status" class="status"></div>
  </div>

</div>

<script>
let step = 0;
let interval;

function startHeat() {
  clearInterval(interval);
  step = 0;

  interval = setInterval(() => {
    step++;

    let label = document.getElementById("label");
    let status = document.getElementById("status");

    if (step === 1) {
      label.style.background = "linear-gradient(90deg, #b07cf7, #d0a2ff)";
      label.innerHTML = "SAFE";
      status.innerHTML = "Température normale";
    }

    if (step === 2) {
      label.style.background = "linear-gradient(90deg, #ffb347, #ffcc70)";
      label.innerHTML = "⚠️ WARNING";
      status.innerHTML = "Chaleur modérée détectée";
    }

    if (step === 3) {
      label.style.background = "linear-gradient(90deg, #ff4d6d, #ff758f)";
      label.innerHTML = "❌ UNSAFE";
      status.innerHTML = "Exposition critique → risque de dégradation";
      clearInterval(interval);
    }

  }, 1500); // vitesse de transition
}
</script>

</body>
</html>
